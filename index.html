<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Первый сайт Давида</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <a href="#about">👤 Обо мне</a>
    <a href="#links">📞 Ссылки</a>
    <a href="#anime">🏀 Аниме</a>
</nav>

<h1>🏀 Добро пожаловать на мой сайт!</h1>

<p>Привет! Меня зовут Давид.</p>

<h2 id="about">👤 Обо мне</h2>

<p>
    Я люблю спорт, программирование и создавать игры.
    Сейчас изучаю создание сайтов и JavaScript.
</p>

<h2 id="links">📞 Мои ссылки</h2>

<p>
    <a href="https://github.com/davidmambetov577-coder" target="_blank">
        🔗 Мой GitHub
    </a>
</p>

<h2 id="anime">🏀 Моё любимое аниме</h2>

<img id="animeImg" src="midorima.jpg" width="300" alt="Персонаж">

<br><br>

<video width="300" controls>
    <source src="Kuroko.mp4" type="video/mp4">
</video>

<p>Мне нравится баскетбол и аниме.</p>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<br>

<button id="musicBtn" onclick="toggleMusic()">
🎵 Музыка
</button>

<button onclick="changeTheme()">
🏀 Сменить персонажа
</button>

<script>

function toggleMusic() {

    let music = document.getElementById("music");
    let btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.innerHTML = "⏸️ Пауза";
    }
    else {
        music.pause();
        btn.innerHTML = "🎵 Музыка";
    }
}

let isMidorima = true;

function changeTheme() {

    let img = document.getElementById("animeImg");
    let nav = document.querySelector("nav");
    let buttons = document.querySelectorAll("button");

    if (isMidorima) {

        img.src = "chibi mura.jpeg";

        document.body.style.background =
        "linear-gradient(-45deg,#5a2d82,#8e44ad,#c678dd,#f3a6ff,#8e44ad,#5a2d82)";
        document.body.style.backgroundSize = "500% 500%";
        document.body.style.animation = "gradient 8s ease infinite";

        nav.style.background = "#5a2d82";

        buttons.forEach(button=>{
            button.style.background="#8e44ad";
        });

        isMidorima = false;
    }
    else {

        img.src = "midorima.jpg";

        document.body.style.background =
        "linear-gradient(-45deg,#0b3d0b,#1faa00,#66ff33,#a8ff60,#1faa00,#0b3d0b)";
        document.body.style.backgroundSize = "500% 500%";
        document.body.style.animation = "gradient 8s ease infinite";

        nav.style.background = "#0b3d0b";

        buttons.forEach(button=>{
            button.style.background="#1faa00";
        });

        isMidorima = true;
    }
}

</script>

</body>

</html>
