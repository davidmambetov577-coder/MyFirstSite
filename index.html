<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Первый сайт Давида</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <a href="#about">👤 Обо мне</a>
    <a href="#links">📞 Ссылки</a>
    <a href="#anime">🏀 Аниме</a>
</nav>

<h1>🏀 Добро пожаловать на мой сайт!</h1>

<p>Привет! Меня зовут Давид.</p>

<h2 id="about">👤 Обо мне</h2>

<p>
    Я люблю спорт, программирование и создавать игры.
    Сейчас изучаю создание сайтов и JavaScript.
</p>

<h2 id="links">📞 Мои ссылки</h2>

<p>
    <a href="https://github.com/davidmambetov577-coder" target="_blank">
        🔗 Мой GitHub
    </a>
</p>

<h2 id="anime">🏀 Моё любимое аниме</h2>
<img id="animeImg" src="Mido.jpg" alt="Персонаж">

<br><br>

<video id="animeVideo" controls>
    <source id="videoSource" src="Mido.mp4" type="video/mp4">
</video>

<p>Мне нравится баскетбол и аниме.</p>
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<br><br>

<button id="musicBtn" onclick="toggleMusic()">
🎵 Музыка
</button>

<button onclick="changeTheme()">
🏀 Следующий персонаж
</button>
<script>

function toggleMusic() {

    let music = document.getElementById("music");
    let btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.innerHTML = "⏸️ Пауза";
    }
    else {
        music.pause();
        btn.innerHTML = "🎵 Музыка";
    }
}
const characters = [

{
    img: "Mido.jpg",
    video: "Mido.mp4",

    bg: "linear-gradient(-45deg,#0b3d0b,#1faa00,#66ff33,#a8ff60,#1faa00,#0b3d0b)",

    nav: "#0b3d0b",
    btn: "#1faa00"
},

{
    img: "chibi mura.jpeg",
    video: "Mura.mp4",

    bg: "linear-gradient(-45deg,#5a2d82,#8e44ad,#c678dd,#f3a6ff,#8e44ad,#5a2d82)",

    nav: "#5a2d82",
    btn: "#8e44ad"
},

{
    img: "aomine.jpeg",
    video: "Aomine.mp4",

    bg: "linear-gradient(-45deg,#001f4d,#0047ab,#3399ff,#66ccff,#0047ab,#001f4d)",

    nav: "#001f4d",
    btn: "#0047ab"
},

{
    img: "Aka.jpeg",
    video: "Aka.mp4",

    bg: "linear-gradient(-45deg,#5c0000,#b30000,#ff3333,#ff8080,#b30000,#5c0000)",

    nav: "#5c0000",
    btn: "#b30000"
}

];

let current = 0;
function changeTheme(){

    current++;

    if(current >= characters.length){
        current = 0;
    }

    let c = characters[current];

    document.getElementById("animeImg").src = c.img;

    let video = document.getElementById("animeVideo");
    let source = document.getElementById("videoSource");

    source.src = c.video;
    video.load();

    document.body.style.background = c.bg;
    document.body.style.backgroundSize = "500% 500%";
    document.body.style.animation = "gradient 8s ease infinite";

    document.querySelector("nav").style.background = c.nav;

    document.querySelectorAll("button").forEach(button => {
        button.style.background = c.btn;
    });
}
</script>

</body>
</html>
