<h2 id="anime">🏀 Моё любимое аниме</h2>

<img src="midorima.jpg" width="300" alt="Мидорима">

<video width="300" controls>
    <source src="Kuroko.mp4" type="video/mp4">
</video>

<p>Мне нравится баскетбол и аниме.</p>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<br>

<button id="musicBtn" onclick="toggleMusic()">
🎵 Музыка
</button>

<button onclick="changeTheme()">
🌙 Сменить тему
</button>

<script>

function toggleMusic() {

    let music = document.getElementById("music");
    let btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play();
        btn.innerHTML = "⏸️ Пауза";
    }
    else {
        music.pause();
        btn.innerHTML = "🎵 Музыка";
    }
}

function changeTheme() {

    if (document.body.style.backgroundColor == "black") {

        document.body.style.backgroundColor = "white";
        document.body.style.color = "black";

    }
    else {

        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";

    }
}

</script>

</body>
